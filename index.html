<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Cutline . motorsport.com</title>
<meta name="description" content="The Cutline. Call the NASCAR playoff cuts and crown the champion. A daily game from motorsport.com.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* src/styles/tokens.css */
/* ============================================================
   THE CUTLINE . design tokens
   ------------------------------------------------------------
   Inherited exactly from Two Seats so The Cutline reads as part
   of the same family. Do not retune these here. The signature
   element is the cutline itself; everything else stays quiet.
   ============================================================ */

:root {
  --bg: #0d1117;
  --panel: #161c24;
  --panel2: #1d2530;
  --raised: #222c38;
  --line: #28323f;
  --line2: #34404f;
  --text: #eef2f6;
  --muted: #8a97a8;
  --faint: #5c6776;
  --amber: #f2e500;
  --amber2: #fff44d;
  --green: #37d99a;
  --red: #ff5d6c;
  --cyan: #3fd8e2;
  --hot: #ff7a3c;

  --disp: "Barlow Condensed", "Arial Narrow", system-ui, sans-serif;
  --body: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;

  --wrap: 680px;
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;

  --ease: cubic-bezier(.4, 0, .2, 1);
}

* { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  color: var(--text);
  background: var(--bg);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font-family: inherit; }

:focus-visible {
  outline: 2px solid var(--cyan);
  outline-offset: 2px;
  border-radius: 3px;
}

::selection { background: rgba(242, 229, 0, .25); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .001ms !important;
    scroll-behavior: auto !important;
  }
}

.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
  border: 0;
}

.visually-quiet { color: var(--muted); }


/* src/styles/app.css */
/* ============================================================
   THE CUTLINE . app chrome
   ------------------------------------------------------------
   Everything around the bracket: brand head, mode metarow,
   modals, toast, result cards, the ad slot, the related games
   rail, and the footer. Quiet by design so the bracket leads.
   ============================================================ */

.checker {
  height: 10px;
  width: 100%;
  background-image:
    linear-gradient(45deg, #11161d 25%, transparent 25%),
    linear-gradient(-45deg, #11161d 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #11161d 75%),
    linear-gradient(-45deg, transparent 75%, #11161d 75%);
  background-size: 16px 16px;
  background-position: 0 0, 0 8px, 8px -8px, -8px 0;
  background-color: var(--panel);
  border-bottom: 1px solid var(--line);
}

.wrap { max-width: var(--wrap); margin: 0 auto; padding: 0 16px; }

/* ---- brand head ---- */
.head { padding: 22px 0 6px; }
.presents { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
.presents .logo-img { height: 17px; width: auto; display: inline-block; vertical-align: middle; }
.presents .logo-img--foot { height: 15px; opacity: .9; }

h1.logo {
  margin: 14px 0 0;
  font-family: var(--disp);
  font-weight: 700;
  font-size: 54px;
  line-height: .9;
  text-transform: uppercase;
  letter-spacing: .01em;
}
h1.logo em { font-style: normal; color: var(--amber); }

.tagline {
  font-family: var(--disp);
  font-weight: 500;
  font-size: 17px;
  letter-spacing: .03em;
  text-transform: uppercase;
  margin-top: 14px;
  color: var(--text);
}
.kick {
  font-family: var(--disp);
  font-size: 11px;
  letter-spacing: .26em;
  color: var(--amber);
  text-transform: uppercase;
  font-weight: 700;
  margin-top: 12px;
}

/* ---- mode + meta row ---- */
.metarow { display: flex; align-items: center; gap: 8px; margin: 18px 0 6px; flex-wrap: wrap; }
.pill {
  font-family: var(--disp);
  font-size: 11.5px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 6px 11px;
}
.pill b { color: var(--amber2); }
.pill.live { color: var(--bg); background: var(--red); border-color: var(--red); font-weight: 700; }
.pill.live b { color: var(--bg); }

.modeswitch { display: inline-flex; border: 1px solid var(--line); border-radius: 20px; overflow: hidden; }
.modeswitch button {
  font-family: var(--disp);
  font-size: 11.5px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  background: none; border: 0;
  padding: 6px 12px; cursor: pointer;
}
.modeswitch button[aria-pressed="true"] { background: var(--raised); color: var(--text); }

.help {
  margin-left: auto;
  font-family: var(--disp);
  font-size: 11.5px;
  letter-spacing: .06em;
  color: var(--muted);
  background: none;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 7px 11px;
  cursor: pointer;
  text-transform: uppercase;
}
.help:hover { color: var(--text); border-color: var(--line2); }

/* ---- brief strip ---- */
.brief {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 16px 18px;
  margin: 12px 0 4px;
}
.brief .bl {
  font-family: var(--disp);
  font-size: 14px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--amber);
  font-weight: 700;
  margin-bottom: 4px;
}
.brief .byr { font-family: var(--disp); font-size: 30px; font-weight: 700; text-transform: uppercase; line-height: 1; }
.brief .bsub { font-size: 13.5px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
.brief .flag {
  display: inline-block; margin-top: 10px;
  font-family: var(--disp); font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--hot); border: 1px solid var(--hot); border-radius: 14px; padding: 3px 9px;
}

/* ---- primary action button ---- */
.btn {
  font-family: var(--disp);
  font-weight: 700;
  font-size: 17px;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--bg);
  background: var(--amber);
  border: 0;
  border-radius: var(--r-md);
  padding: 14px 18px;
  width: 100%;
  cursor: pointer;
  transition: filter .15s var(--ease), transform .05s var(--ease);
}
.btn:hover { filter: brightness(1.06); }
.btn:active { transform: translateY(1px); }
.btn:disabled { background: var(--raised); color: var(--faint); cursor: not-allowed; filter: none; }
.btn.ghost { background: none; color: var(--text); border: 1px solid var(--line2); }
.btn.ghost:hover { border-color: var(--cyan); color: var(--cyan); filter: none; }

.actionbar { margin: 16px 0 4px; display: grid; gap: 10px; }
.actionbar.two { grid-template-columns: 1fr 1fr; }

/* ---- modal ---- */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(6, 9, 13, .72);
  display: flex; align-items: center; justify-content: center;
  padding: 18px; z-index: 50;
  opacity: 0; pointer-events: none; transition: opacity .2s var(--ease);
}
.modal-bg.show { opacity: 1; pointer-events: auto; }
.mbox {
  width: 100%; max-width: 460px;
  background: var(--bg);
  border: 1px solid var(--line2);
  border-radius: var(--r-lg);
  padding: 26px 24px;
  max-height: 88vh; overflow-y: auto;
}
.mbox h2 {
  font-family: var(--disp); font-weight: 700; text-transform: uppercase;
  font-size: 26px; margin: 0 0 4px; letter-spacing: .01em;
}
.mbox p { color: var(--muted); font-size: 14px; line-height: 1.6; margin: 8px 0; }
.mbox .rule { font-size: 14px; line-height: 1.55; margin: 10px 0; padding-left: 14px; border-left: 2px solid var(--line2); color: var(--text); }
.mbox .rule b { color: var(--amber2); }
.mclose { margin-top: 18px; }
.mdismiss {
  position: absolute; top: 14px; right: 16px;
  background: none; border: 0; color: var(--muted);
  font-size: 22px; cursor: pointer; line-height: 1;
}
.mbox { position: relative; }

/* ---- toast ---- */
.toast {
  position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
  background: var(--raised); border: 1px solid var(--line2);
  color: var(--text); font-size: 13.5px;
  padding: 11px 16px; border-radius: var(--r-md);
  opacity: 0; pointer-events: none; transition: opacity .2s var(--ease), transform .2s var(--ease);
  z-index: 60; max-width: 90vw; text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ---- result / verdict ---- */
.verdict {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 20px; margin: 14px 0;
  text-align: center;
}
.verdict .grade {
  font-family: var(--disp); font-weight: 700; font-size: 64px; line-height: 1;
}
.verdict.good .grade { color: var(--green); }
.verdict.mid .grade { color: var(--amber2); }
.verdict.bad .grade { color: var(--red); }
.verdict .glabel { font-family: var(--disp); text-transform: uppercase; letter-spacing: .14em; font-size: 15px; margin-top: 8px; }
.verdict .ghead { color: var(--muted); font-size: 14px; margin-top: 6px; }
.verdict .pct { color: var(--faint); font-size: 12.5px; margin-top: 10px; font-style: italic; }

.scoreline { display: flex; gap: 10px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
.scorebox { background: var(--panel2); border: 1px solid var(--line); border-radius: var(--r-md); padding: 10px 16px; min-width: 92px; }
.scorebox .v { font-family: var(--disp); font-weight: 700; font-size: 26px; line-height: 1; }
.scorebox .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-top: 4px; }

.roundbreak { margin: 14px 0; display: grid; gap: 8px; }
.rbrow {
  display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center;
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-md); padding: 10px 14px;
}
.rbrow .rl { font-family: var(--disp); text-transform: uppercase; letter-spacing: .08em; font-size: 14px; }
.rbrow .rh { font-size: 13px; color: var(--muted); }
.rbrow .rn { font-family: var(--disp); font-weight: 700; font-size: 18px; }
.rbrow.perfect { border-color: var(--green); }
.rbrow .badge { font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--green); }

/* ---- archive ---- */
.section-h {
  font-family: var(--disp); font-weight: 700; text-transform: uppercase;
  letter-spacing: .14em; font-size: 14px; color: var(--muted);
  margin: 26px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line);
}
.arch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.arch-card {
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-md);
  padding: 13px 14px; cursor: pointer; text-align: left;
  transition: border-color .15s var(--ease), transform .05s var(--ease);
}
.arch-card:hover { border-color: var(--line2); }
.arch-card:active { transform: translateY(1px); }
.arch-card .ay { font-family: var(--disp); font-weight: 700; font-size: 24px; line-height: 1; }
.arch-card .ac { font-size: 13px; color: var(--text); margin-top: 6px; }
.arch-card .ac span { color: var(--muted); }
.arch-card .atag {
  display: inline-block; margin-top: 9px; font-family: var(--disp);
  font-size: 10px; letter-spacing: .1em; text-transform: uppercase; padding: 2px 7px; border-radius: 10px;
}
.arch-card .atag.full { color: var(--green); border: 1px solid var(--green); }
.arch-card .atag.part { color: var(--hot); border: 1px solid var(--hot); }
.arch-card.locked { opacity: .92; }

/* ---- ad slot ---- */
.adslot {
  margin: 22px 0; padding: 14px;
  background: var(--panel); border: 1px dashed var(--line2); border-radius: var(--r-md);
  text-align: center; min-height: 96px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
}
.adslot .adk { font-family: var(--disp); font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--faint); }
.adslot .adm { font-size: 12.5px; color: var(--muted); }

/* ---- related games rail ---- */
.rail { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
.railcard {
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-md);
  padding: 14px; text-decoration: none; color: inherit; display: block;
  transition: border-color .15s var(--ease);
}
.railcard:hover { border-color: var(--cyan); }
.railcard .rg-k { font-family: var(--disp); font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--amber); }
.railcard .rg-n { font-family: var(--disp); font-weight: 700; text-transform: uppercase; font-size: 19px; margin-top: 4px; }
.railcard .rg-d { font-size: 12.5px; color: var(--muted); margin-top: 4px; line-height: 1.45; }

/* ---- footer ---- */
.foot {
  margin: 30px 0 40px; padding-top: 16px; border-top: 1px solid var(--line);
  color: var(--faint); font-size: 12px; line-height: 1.6;
}
.foot a { color: var(--muted); }

.screen { display: none; }
.screen.active { display: block; }

@media (max-width: 460px) {
  h1.logo { font-size: 44px; }
  .actionbar.two { grid-template-columns: 1fr; }
}


/* src/styles/bracket.css */
/* ============================================================
   THE CUTLINE . the bracket (signature surface)
   ------------------------------------------------------------
   The bracket is the hero and the cutline is the one memorable
   thing. While picking, drivers sit in a single column and a
   literal amber line marks the cut. As a round resolves the line
   tightens: survivors lift above it, the cut drops below.
   Mobile first (one column, swipe round to round); the desktop
   wide bracket is layered on at the bottom.
   ============================================================ */

/* ---- round stepper ---- */
.stepper { display: flex; gap: 6px; margin: 14px 0 4px; }
.step {
  flex: 1; text-align: center;
  font-family: var(--disp); font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--faint); padding: 8px 4px; border-radius: var(--r-sm);
  border: 1px solid var(--line); background: var(--panel);
}
.step.on { color: var(--bg); background: var(--amber); border-color: var(--amber); font-weight: 700; }
.step.done { color: var(--green); border-color: var(--line2); }

/* ---- round heading ---- */
.round-head { margin: 16px 0 10px; }
.round-head .rt { font-family: var(--disp); font-weight: 700; text-transform: uppercase; font-size: 28px; line-height: 1; }
.round-head .rmeta { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
.round-head .rprompt {
  font-family: var(--disp); text-transform: uppercase; letter-spacing: .08em;
  font-size: 13px; color: var(--amber2); margin-top: 8px;
}
.round-head .rcount { color: var(--muted); }

/* ---- the cutline (signature) ---- */
.cutboard { position: relative; margin: 6px 0 4px; }

.cutline {
  position: relative;
  display: flex; align-items: center; gap: 10px;
  margin: 10px 0; padding: 0 2px;
  color: var(--amber);
  font-family: var(--disp); font-weight: 700; text-transform: uppercase;
  font-size: 12px; letter-spacing: .22em;
}
.cutline::before, .cutline::after {
  content: ""; height: 2px; flex: 1;
  background: repeating-linear-gradient(90deg, var(--amber) 0 9px, transparent 9px 16px);
}
.cutline .ctag { white-space: nowrap; }
.cutline .ctight {
  transition: opacity .3s var(--ease);
  color: var(--muted); letter-spacing: .12em; font-size: 11px;
}

/* ---- driver row ---- */
.drow {
  display: grid; grid-template-columns: 26px 1fr auto;
  align-items: center; gap: 10px;
  background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--r-md); padding: 12px 13px; width: 100%;
  cursor: pointer; text-align: left; color: var(--text);
  transition: border-color .12s var(--ease), background .12s var(--ease), transform .04s var(--ease);
}
.drow + .drow { margin-top: 7px; }
.drow:hover { border-color: var(--line2); }
.drow:active { transform: translateY(1px); }
.drow .seed { font-family: var(--disp); font-size: 13px; color: var(--faint); text-align: center; }
.drow .nm { font-family: var(--disp); font-weight: 600; font-size: 18px; text-transform: uppercase; letter-spacing: .01em; }
.drow .car { color: var(--faint); font-weight: 500; font-size: 13px; margin-left: 7px; }
.drow .tick { font-size: 13px; color: var(--faint); transition: color .12s var(--ease); }
.drow .tags { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
.drow .tag {
  font-size: 10px; letter-spacing: .04em; text-transform: uppercase;
  color: var(--cyan); border: 1px solid var(--line2); border-radius: 10px; padding: 1px 7px;
}
.drow .cushion {
  font-family: var(--disp); font-weight: 700; font-size: 13px; text-align: right; min-width: 54px;
}
.drow .cushion.pos { color: var(--green); }
.drow .cushion.neg { color: var(--red); }
.drow .cushion.lock { color: var(--amber2); }

.drow.on { border-color: var(--amber); background: var(--panel2); }
.drow.on .tick { color: var(--amber); }
.drow.on .nm { color: var(--amber2); }

.drow.crowned { border-color: var(--amber2); }
.drow.crowned .tick { color: var(--amber2); }

.drow:disabled { cursor: default; opacity: .55; }

/* reveal states layered on the same row */
.drow.r-hit { border-color: var(--green); }
.drow.r-hit .tick { color: var(--green); }
.drow.r-miss { border-color: var(--red); }
.drow.r-miss .tick { color: var(--red); }
.drow.r-upset { border-color: var(--cyan); }
.drow .reveal-note {
  font-size: 11.5px; color: var(--muted); margin-top: 3px;
}
.drow.r-hit .reveal-note { color: var(--green); }
.drow.r-miss .reveal-note { color: var(--red); }
.drow.r-upset .reveal-note { color: var(--cyan); }

.colstack > div { min-width: 0; }

/* ---- reveal sequence ---- */
.reveal-round { margin: 18px 0; }
.reveal-round .rrh {
  display: flex; align-items: baseline; gap: 10px;
  font-family: var(--disp); text-transform: uppercase; letter-spacing: .06em;
  font-size: 18px; font-weight: 700; margin-bottom: 8px;
}
.reveal-round .rrh .rrs { font-size: 13px; color: var(--muted); font-weight: 500; letter-spacing: .04em; }
.reveal-round .rrh .rrs.good { color: var(--green); }
.reveal-round .rrh .rrs.bad { color: var(--red); }

/* ---- share grid ---- */
.sharebox {
  background: var(--panel); border: 1px solid var(--line2);
  border-radius: var(--r-md); padding: 16px; margin: 12px 0;
}
.sharegrid {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 16px; line-height: 1.5; white-space: pre; letter-spacing: 2px;
  color: var(--text); text-align: center;
}
.sharecap { color: var(--muted); font-size: 12.5px; text-align: center; margin-top: 8px; }

/* ============================================================
   desktop wide bracket
   ============================================================ */
.wide-bracket { display: none; }

@media (min-width: 900px) {
  .wide-bracket {
    display: grid;
    grid-template-columns: repeat(4, 1fr) .8fr;
    gap: 14px; align-items: start;
    margin: 18px 0;
  }
  .wb-col { display: flex; flex-direction: column; gap: 8px; }
  .wb-col h4 {
    font-family: var(--disp); text-transform: uppercase; letter-spacing: .1em;
    font-size: 12px; color: var(--muted); margin: 0 0 4px; text-align: center;
  }
  .wb-cell {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-sm);
    padding: 8px 10px; font-family: var(--disp); font-size: 14px; text-transform: uppercase;
    display: flex; justify-content: space-between; gap: 8px;
  }
  .wb-cell .wbseed { color: var(--faint); }
  .wb-cell.adv { border-color: var(--green); }
  .wb-cell.cut { opacity: .5; }
  .wb-cell.champ { border-color: var(--amber2); color: var(--amber2); }
  .wb-crown {
    align-self: center; font-family: var(--disp); font-weight: 700; text-transform: uppercase;
    color: var(--amber2); font-size: 16px; border: 1px solid var(--amber2);
    border-radius: var(--r-sm); padding: 14px 10px; text-align: center;
  }
}

/* keep the pick surface single column on small screens; this is the
   intended mobile experience, not a fallback */
@media (max-width: 899px) {
  .wide-bracket { display: none; }
}

</style>
</head>

/* ---- src/data/tracks.js ---- */
/* ============================================================
   THE CUTLINE . data layer (track context)
   ------------------------------------------------------------
   Track context makes a pick informed: which kind of track each
   round turns on, and how a driver tends to run on that kind.

   Two tiers, both honest about their source:

   ROUND ARCHETYPES are structurally true for the elimination era.
   Every Round of 8 in this era ran a superspeedway and a short
   track. Every Round of 12 since 2018 ran the Charlotte Roval
   road course. The finale ran a flat one mile (Phoenix) or an
   intermediate (Homestead). These are facts about the calendar.

   DRIVER SPLITS (road course ace, short track specialist,
   superspeedway gambler) are MODELED archetypes for the demo,
   flagged below. At handoff they are replaced by real
   Motorsport Stats driver splits by track type. They never
   affect scoring. They are pick context only.
   ============================================================ */
const SPLITS_SOURCE = "modeled";  /* flip to "motorsport-stats" at handoff */

/* track types used across the game */
const TRACK_TYPE = {
  SUPER: "Superspeedway",
  ROAD: "Road course",
  SHORT: "Short track",
  INTER: "Intermediate",
  FLAT: "Flat mile",
};

/* signature tracks by round. Recent seasons carry their verified
   calendar. Earlier seasons fall back to the era archetype, which
   is true at the type level even when an exact venue differs. */
const ARCH = {
  ro16: [TRACK_TYPE.INTER, TRACK_TYPE.SHORT],
  ro12: [TRACK_TYPE.INTER, TRACK_TYPE.ROAD],
  ro8: [TRACK_TYPE.SUPER, TRACK_TYPE.SHORT],
};
const ROUND_TRACKS = {
  2025: {
    ro16: ["Darlington", "World Wide Technology Raceway", "Bristol"],
    ro12: ["New Hampshire", "Kansas", "Charlotte Roval"],
    ro8: ["Las Vegas", "Talladega", "Martinsville"],
    finale: "Phoenix",
  },
  2024: {
    ro16: ["Atlanta", "Watkins Glen", "Bristol"],
    ro12: ["Kansas", "Talladega", "Charlotte Roval"],
    ro8: ["Las Vegas", "Homestead", "Martinsville"],
    finale: "Phoenix",
  },
  2023: {
    ro16: ["Darlington", "Kansas", "Bristol"],
    ro12: ["Texas", "Talladega", "Charlotte Roval"],
    ro8: ["Las Vegas", "Homestead", "Martinsville"],
    finale: "Phoenix",
  },
  2022: {
    ro16: ["Darlington", "Kansas", "Bristol"],
    ro12: ["Texas", "Talladega", "Charlotte Roval"],
    ro8: ["Las Vegas", "Homestead", "Martinsville"],
    finale: "Phoenix",
  },
};

/* archetype description for a round, used when a season has no
   exact calendar wired up. */
function roundArchetype(round) {
  return ARCH[round] || [];
}

/* a short, human readable line describing what a round turns on */
function roundTrackLine(year, round) {
  const rt = ROUND_TRACKS[year];
  if (rt && rt[round]) {
    const tracks = rt[round];
    return tracks.join(", ");
  }
  const types = roundArchetype(round);
  return types.length ? types.join(" and ") + " test" : "";
}

   only. one to two tags per driver. Replace with real splits at

/* demo schedule: the Round of 16 is open and mid resolve, the rest
   are scheduled in the future. greenFlag relative to "now" at load
   so the demo always shows one open, locked-soon round. */
function demoRounds(now) {
  return [
    {
      key: "ro16", label: "Round of 16",
      greenFlag: now + 2 * DAY, resolved: false,
      races: [
        { name: "Darlington", done: true },
        { name: "Gateway", done: true },
        { name: "Bristol", done: false },
      ],
    },
    { key: "ro12", label: "Round of 12", greenFlag: now + 9 * DAY, resolved: false,
      races: [{ name: "New Hampshire", done: false }, { name: "Kansas", done: false }, { name: "Charlotte Roval", done: false }] },
    { key: "ro8", label: "Round of 8", greenFlag: now + 16 * DAY, resolved: false,
      races: [{ name: "Las Vegas", done: false }, { name: "Talladega", done: false }, { name: "Martinsville", done: false }] },
    { key: "finale", label: "Championship 4", greenFlag: now + 23 * DAY, resolved: false,
      races: [{ name: "Phoenix", done: false }] },
  ];
}

/* demo accumulated standings through the open round. One driver has
   already won in round (locked in), the rest carry base plus points
   so the cutline math has something real to chew on. */
function demoStandings(key, base) {
  /* points within the round so far layered on the seed field */
  const inRound = {
    "Driver A": 38, "Driver B": 30, "Driver C": 33, "Driver D": 22,
    "Driver E": 19, "Driver F": 25, "Driver G": 14, "Driver H": 11,
    "Driver I": 13, "Driver J": 7, "Driver K": 9, "Driver L": 4,
    "Driver M": 6, "Driver N": 2, "Driver O": 3, "Driver P": 1,
  };
  const winners = new Set(["Driver F"]); /* won and in */
  return DEMO_FIELD.map(d => ({
    name: d.name, car: d.car, seed: d.seed,
    playoffPoints: d.playoffPoints,
    points: base + d.playoffPoints + (inRound[d.name] || 0),
    won: winners.has(d.name),
  }));
}

/* the demo adapter */
function demoFeed(now = Date.now()) {
  const rounds = demoRounds(now);
  const ROUND_BASE = { ro16: 2000, ro12: 3000, ro8: 4000, finale: 5000 };
  return {
    meta: () => ({ year: DEMO_YEAR, source: FEED_SOURCE, label: "Demo playoff feed" }),
    rounds: () => rounds.slice(),
    round: key => rounds.find(r => r.key === key) || null,
    standings: key => demoStandings(key, ROUND_BASE[key] || 0),
    finishOrder: () => DEMO_FIELD.map(d => d.name),
  };
}

/* validate that an arbitrary object satisfies the adapter contract,
   so a real feed can be checked at integration time. */
function isFeedAdapter(obj) {
  return !!obj &&
    typeof obj.meta === "function" &&
    typeof obj.rounds === "function" &&
    typeof obj.round === "function" &&
    typeof obj.standings === "function" &&
    typeof obj.finishOrder === "function";
}

/* ---- src/engine/rng.js ---- */
/* ============================================================
   THE CUTLINE . engine (rng + daily determinism)
   ------------------------------------------------------------
   A given date always serves the same historical field. The
   daily rotates only through fully verified seasons.
   ============================================================ */

/* deterministic 32 bit PRNG */
function mulberry32(a) {
  return function () {
    a |= 0;
    a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* epoch day 1 of the daily. 2026-06-18 UTC = puzzle No. 1. */
const DAY0_UTC = Date.UTC(2026, 5, 18);
const DAY_MS = 86400000;

/* puzzle number for a given timestamp (defaults to now) */
function puzzleNumber(now = Date.now()) {
  return Math.floor((now - DAY0_UTC) / DAY_MS) + 1;
}

/* the season year served on a given puzzle number. deterministic
   and uniform across the verified pool. */
function dailyYear(no, pool = DAILY_POOL_YEARS) {
  const rng = mulberry32((no * 2654435761) >>> 0);
  return pool[Math.floor(rng() * pool.length)];
}

/* convenience: the daily descriptor for a timestamp */
function pickDaily(now = Date.now(), pool = DAILY_POOL_YEARS) {
  const no = puzzleNumber(now);
  return { no, year: dailyYear(no, pool), mode: "daily" };
}

/* string seed helper for archive runs that should still be stable
   within a session but distinct from the daily. */
function strSeed(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

/* ---- src/engine/cutline.js ---- */
/* ============================================================
   THE CUTLINE . engine (cutline points math)
   ------------------------------------------------------------
   The real NASCAR playoff points rules, implemented and tested.
   The algorithm is the verified part. Exact historical point
   values arrive from the Motorsport Stats feed; this module turns
   them into the cushion numbers the bracket shows.

   Rules encoded:
   . each round resets every surviving driver to a round base,
     then adds the playoff points they carry.
       Round of 16 base 2000
       Round of 12 base 3000
       Round of 8  base 4000
       finale      base 5000, no playoff points added
   . a win inside a round locks that driver into the next round
     regardless of points (win and in).
   . the bottom drivers by points among non winners are cut to
     leave the round's transfer count.
   . the finale is decided by finishing order, not points: the
     highest finisher of the four is champion.
   ============================================================ */
const ROUND_BASE = { ro16: 2000, ro12: 3000, ro8: 4000, finale: 5000 };
const TRANSFER_SLOTS = { ro16: 12, ro12: 8, ro8: 4 };

/* reset standings entering a round.
   drivers: [{ name, playoffPoints }]
   returns [{ name, points }] with points = base + playoffPoints,
   except the finale which adds nothing. */
function resetEntering(drivers, round) {
  const base = ROUND_BASE[round];
  const addPP = round !== "finale";
  return drivers.map(d => ({
    name: d.name,
    points: base + (addPP ? (d.playoffPoints || 0) : 0),
  }));
}

/* compute the cutline for a round.
   standings: [{ name, points, won? }] accumulated through the round.
   round: "ro16" | "ro12" | "ro8"
   returns:
     advancing   Set of names who transfer (winners + top points)
     firstOut    { name, points } | null   (highest eliminated)
     lastIn      { name, points } | null   (lowest non winner advancing)
     cushions    Map name -> signed points relative to the line
                 (+ above, - below; winners are +Infinity = locked)
     locked      Set of names locked in by a win */
function computeCutline(standings, round) {
  const slots = TRANSFER_SLOTS[round];
  if (!Number.isInteger(slots)) throw new Error("unknown round: " + round);

  const locked = new Set(standings.filter(s => s.won).map(s => s.name));
  const contenders = standings
    .filter(s => !s.won)
    .slice()
    .sort((a, b) => b.points - a.points || a.name.localeCompare(b.name));

  const remaining = Math.max(0, slots - locked.size);
  const lastIn = remaining > 0 ? contenders[remaining - 1] || null : null;
  const firstOut = contenders[remaining] || null;

  const advancing = new Set(locked);
  for (let i = 0; i < remaining && i < contenders.length; i++) {
    advancing.add(contenders[i].name);
  }

  const cushions = new Map();
  for (const s of standings) {
    if (locked.has(s.name)) { cushions.set(s.name, Infinity); continue; }
    if (advancing.has(s.name)) {
      /* margin to the first driver below the line */
      cushions.set(s.name, firstOut ? s.points - firstOut.points : Infinity);
    } else {
      /* deficit to the last driver above the line */
      cushions.set(s.name, lastIn ? s.points - lastIn.points : -Infinity);
    }
  }

  return { advancing, firstOut, lastIn, cushions, locked };
}

/* cushion for a single driver, given a computed cutline */
function cushionFor(name, cutInfo) {
  const v = cutInfo.cushions.get(name);
  return v === undefined ? null : v;
}

/* finale: highest finisher of the championship four is champion.
   finishOrder: [names] best to worst (only the four matter). */
function finaleChampion(champ4Names, finishOrder) {
  for (const name of finishOrder) {
    if (champ4Names.includes(name)) return name;
  }
  return null;
}

/* format a cushion for display: "+18", "-7", "LOCKED", "CUT" */
function cushionLabel(v) {
  if (v === Infinity) return "LOCKED";
  if (v === -Infinity) return "OUT";
  if (v === null) return "";
  if (v > 0) return "+" + v;
  if (v === 0) return "EVEN";
  return String(v);
}

/* ---- src/engine/scoring.js ---- */
/* ============================================================
   THE CUTLINE . engine (scoring)
   ------------------------------------------------------------
   Two numbers come out of a played bracket:

   GRADE is accuracy. How right was the bracket, round weighted,
   on a 0 to 100 scale. A correct Championship 4 pick counts more
   than a Round of 16 survivor; the champion counts most.

   SCORE is points. Grade plus the strategy layers: perfect round
   bonuses, called upset bonuses (a driver below the line who
   advances anyway), and the confidence bet (multiply a round's
   points, but pay the extra stake on what you miss). Score is the
   leaderboard number; it separates skill from luck.

   This module assumes the season's results are verified truth.
   Only fully verified seasons are ever scored.
   ============================================================ */

/* round model */
const ROUNDS = [
  { key: "ro16", slots: 12, weight: 1, cut: 16, perfect: 3, upset: 2, label: "Round of 16" },
  { key: "ro12", slots: 8, weight: 2, cut: 12, perfect: 4, upset: 2, label: "Round of 12" },
  { key: "ro8", slots: 4, weight: 4, cut: 8, perfect: 6, upset: 3, label: "Round of 8" },
];
const CHAMPION_WEIGHT = 12;

/* accuracy ceiling: every survivor right at every round, plus champ */
const ACCURACY_MAX =
  ROUNDS.reduce((s, r) => s + r.slots * r.weight, 0) + CHAMPION_WEIGHT;

/* did a driver survive a given round's cut?
   out = round eliminated (16/12/8) or 4 for the Championship 4.
   surviving round R means out is deeper than R's cut. */
function survived(driver, roundCut) {
  return driver.out < roundCut; /* out 4 survives all; out 16 survives none */
}

/* clamp confidence to the allowed bet levels */
function conf(c) {
  return c === 2 || c === 1.5 ? c : 1;
}

/* score a played bracket.
   args:
     season    { drivers:[{n,out,champ}], ... }
     picks     { ro16:[names], ro12:[names], ro8:[names], champion:name }
     confidence{ ro16,ro12,ro8,champion } each 1 | 1.5 | 2 (optional)
     belowLine { ro16:Set, ro12:Set, ro8:Set } names below the line
               entering the round's final race, for upset bonus
               (optional; no fabrication when absent) */
function scoreBracket({ season, picks, confidence = {}, belowLine = {} }) {
  const byName = new Map(season.drivers.map(d => [d.n, d]));
  const detail = [];
  let accuracy = 0;
  let score = 0;

  for (const r of ROUNDS) {
    const advanced = picks[r.key] || [];
    let hits = 0;
    let upsets = 0;
    for (const name of advanced) {
      const d = byName.get(name);
      if (d && survived(d, r.cut)) {
        hits++;
        const bl = belowLine[r.key];
        if (bl && bl.has(name)) upsets++;
      }
    }
    accuracy += hits * r.weight;

    const c = conf(confidence[r.key]);
    const perfect = hits === r.slots;
    const earned = hits * r.weight + (perfect ? r.perfect : 0) + upsets * r.upset;
    const misses = r.slots - hits;
    const riskPenalty = misses * r.weight * (c - 1);
    const net = Math.round(earned * c - riskPenalty);
    score += net;

    detail.push({
      key: r.key, label: r.label, slots: r.slots, hits, perfect,
      upsets, confidence: c, net,
    });
  }

  /* champion */
  const championPick = picks.champion || null;
  const realChamp = season.drivers.find(d => d.champ);
  const championOK = !!(championPick && realChamp && championPick === realChamp.n);
  if (championOK) accuracy += CHAMPION_WEIGHT;
  const cc = conf(confidence.champion);
  const champEarned = championOK ? CHAMPION_WEIGHT : 0;
  const champPenalty = championOK ? 0 : CHAMPION_WEIGHT * (cc - 1);
  const champNet = Math.round(champEarned * cc - champPenalty);
  score += champNet;

  const grade = Math.round((accuracy / ACCURACY_MAX) * 100);

  const out = {
    grade,
    score,
    championOK,
    championPick,
    realChampName: realChamp ? realChamp.n : null,
    detail,
    champNet,
    percentile: estimatePercentile(grade),
  };
  Object.assign(out, verdict(out));
  return out;
}

/* estimated percentile vs the field, from grade. A real leaderboard
   replaces this in live mode; here it is a calibrated curve and is
   always labelled estimated in product. */
function estimatePercentile(grade) {
  /* sigmoid centred near a typical bracket (~55 grade) */
  const p = 100 / (1 + Math.exp(-(grade - 52) / 12));
  return Math.max(1, Math.min(99, Math.round(p)));
}

/* a label and tag tone for the verdict card */
function verdict(out) {
  if (out.championOK && out.grade >= 85)
    return { label: "Crystal ball", tag: "good", headline: "You called the title" };
  if (out.grade >= 70)
    return { label: "Strong bracket", tag: "good", headline: out.grade + "% accurate" };
  if (out.grade >= 50)
    return { label: "Solid read", tag: "mid", headline: out.grade + "% accurate" };
  return { label: "Busted bracket", tag: "bad", headline: out.grade + "% accurate" };
}

/* ---- src/engine/lock.js ---- */
/* ============================================================
   THE CUTLINE . engine (live pick lock)
   ------------------------------------------------------------
   Mode B integrity. A round's survivor picks lock at the green
   flag of the round's first race and cannot change after. This
   module is the single gate for that rule.
   ============================================================ */

/* a round is open for picks until its first green flag */
function isRoundOpen(round, now = Date.now()) {
  if (!round || round.greenFlag == null) return false;
  return now < round.greenFlag;
}

/* the lock state for a round */
function lockState(round, now = Date.now()) {
  if (!round || round.greenFlag == null) return "unscheduled";
  return now < round.greenFlag ? "open" : "locked";
}

/* attempt to set picks for a round. returns a result object rather
   than throwing so the UI can show a clean message. once locked,
   the stored picks are final. */
function submitPicks(state, roundKey, picks, now = Date.now()) {
  const round = state.rounds && state.rounds[roundKey];
  if (!round) return { ok: false, reason: "unknown-round", picks: null };
  if (lockState(round, now) !== "open") {
    return { ok: false, reason: "locked", picks: state.picks[roundKey] || null };
  }
  state.picks[roundKey] = picks.slice();
  state.lockedAt = state.lockedAt || {};
  return { ok: true, picks: state.picks[roundKey] };
}

/* explicit hard lock at green flag. idempotent. after this the
   picks for the round are frozen. */
function lockRound(state, roundKey, now = Date.now()) {
  state.lockedAt = state.lockedAt || {};
  if (state.lockedAt[roundKey] == null) state.lockedAt[roundKey] = now;
  return state.lockedAt[roundKey];
}

/* can the player still edit this round? */
function canEdit(state, roundKey, now = Date.now()) {
  const round = state.rounds && state.rounds[roundKey];
  return lockState(round, now) === "open";
}

/* milliseconds until lock, or null if not open */
function timeToLock(round, now = Date.now()) {
  if (lockState(round, now) !== "open") return null;
  return round.greenFlag - now;
}

/* ---- src/engine/bracket.js ---- */
/* ============================================================
   THE CUTLINE . engine (bracket state machine)
   ------------------------------------------------------------
   Drives the play loop independent of any rendering. Advance who
   survives each cut: 16 to 12 to 8 to 4, then crown a champion.
   Tracks the advanced set per stage so scoring and the reveal can
   replay the player's bracket.
   ============================================================ */
const STAGES = [
  { key: "ro16", round: "Round of 16", from: 16, keep: 12, next: "Round of 12" },
  { key: "ro12", round: "Round of 12", from: 12, keep: 8, next: "Round of 8" },
  { key: "ro8", round: "Round of 8", from: 8, keep: 4, next: "Championship 4" },
  { key: "champ", round: "Championship 4", from: 4, keep: 1, next: "Crown" },
];

/* start a bracket from a season. pool ordered by seed for a clean
   top to bottom bracket. */
function startBracket(season, opts = {}) {
  const pool = season.drivers
    .slice()
    .sort((a, b) => (a.seed || 99) - (b.seed || 99) || a.car - b.car);
  return {
    season,
    mode: opts.mode || "daily",
    no: opts.no || null,
    stage: 0,
    pool,
    selection: [],
    history: { ro16: null, ro12: null, ro8: null, champion: null },
    confidence: { ro16: 1, ro12: 1, ro8: 1, champion: 1 },
    done: false,
  };
}
function currentStage(state) {
  return STAGES[state.stage];
}

/* toggle a driver in the current selection, honouring the keep
   count. champion stage is single select with swap. */
function toggle(state, name) {
  const st = currentStage(state);
  const i = state.selection.indexOf(name);
  if (i >= 0) { state.selection.splice(i, 1); return { ok: true }; }
  if (state.selection.length >= st.keep) {
    if (st.keep === 1) { state.selection = [name]; return { ok: true }; }
    return { ok: false, reason: "full", keep: st.keep };
  }
  state.selection.push(name);
  return { ok: true };
}
function canAdvance(state) {
  return state.selection.length === currentStage(state).keep;
}

/* advance the bracket. records the advanced set, narrows the pool,
   and moves to the next stage. returns { done } when the champion
   is crowned. */
function advance(state) {
  const st = currentStage(state);
  if (state.selection.length !== st.keep) {
    return { ok: false, reason: "incomplete", need: st.keep };
  }
  if (st.key === "champ") {
    state.history.champion = state.selection[0];
    state.done = true;
    return { ok: true, done: true };
  }
  state.history[st.key] = state.selection.slice();
  state.pool = state.selection
    .slice()
    .sort((a, b) => byName(state, a).seed - byName(state, b).seed)
    .map(n => byName(state, n));
  state.selection = [];
  state.stage++;
  return { ok: true, done: false };
}

function byName(state, name) {
  return state.season.drivers.find(d => d.n === name);
}

/* turn the recorded history into the picks object scoring expects */
function toPicks(state) {
  return {
    ro16: state.history.ro16 || [],
    ro12: state.history.ro12 || [],
    ro8: state.history.ro8 || [],
    champion: state.history.champion || null,
  };
}

/* ---- src/render/dom.js ---- */
/* ============================================================
   THE CUTLINE . render helpers
   ------------------------------------------------------------
   Minimal DOM utilities. No framework. Names are globally unique
   so the build step can inline every module into one script.
   ============================================================ */

/* escape text for safe insertion into markup */
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* build an element from a tag, attributes, and children/markup */
function el(tag, attrs = {}, html) {
  const node = document.createElement(tag);
  for (const k in attrs) {
    const v = attrs[k];
    if (v == null || v === false) continue;
    if (k === "class") node.className = v;
    else if (k === "html") node.innerHTML = v;
    else if (k.slice(0, 2) === "on" && typeof v === "function") {
      node.addEventListener(k.slice(2).toLowerCase(), v);
    } else node.setAttribute(k, v === true ? "" : v);
  }
  if (html != null) node.innerHTML = html;
  return node;
}
function clear(node) { while (node && node.firstChild) node.removeChild(node.firstChild); }
function mount(node, ...children) {
  clear(node);
  for (const c of children) if (c) node.appendChild(c);
  return node;
}

/* ---- src/render/bracket-view.js ---- */
/* ============================================================
   THE CUTLINE . render (bracket view)
   ------------------------------------------------------------
   Draws the pick surface for the current round: a round heading
   with track context, then the field as a single column split by
   the cutline. Survivors you pick lift above the line; the rest
   sit below it. Cushions shown next to each driver are modeled
   (flagged in product) and never affect scoring.

   Also renders the read only desktop wide bracket from a played
   or revealed state.
   ============================================================ */




const ROUND_PROMPT = {
  ro16: "Pick the 12 who survive the Round of 16",
  ro12: "Pick the 8 who survive the Round of 12",
  ro8: "Pick the Championship 4",
  champ: "Crown your champion",
};

/* modeled cushion line for a driver entering a round. Derived from
   seed only, clearly a model. Real points arrive from the feed. */
function modeledCushion(driver, stage) {
  if (stage.key === "champ") return null;
  const seed = driver.seed || 8;
  const mid = stage.keep + 0.5;
  /* rough, monotonic in seed: better seed, bigger cushion */
  const v = Math.round((mid - seed) * 6);
  return v;
}

function cushionClass(v) {
  if (v === Infinity) return "lock";
  if (v > 0) return "pos";
  if (v < 0) return "neg";
  return "";
}

function tagChips(name, stage) {
  const relevant = new Set(ROUND_RELEVANT_TAGS[stage.key] || []);
  const tags = driverTags(name).filter(t => relevant.has(t));
  if (!tags.length) return "";
  return '<div class="tags">' +
    tags.map(t => '<span class="tag">' + esc(TAG_LABEL[t] || t) + "</span>").join("") +
    "</div>";
}

/* render the round head into a container */
function renderRoundHead(node, state) {
  const st = currentStage(state);
  const year = state.season.year;
  const trackLine = roundTrackLine(year, st.key);
  const chosen = state.selection.length;
  mount(node,
    el("div", { class: "round-head" },
      '<div class="rt">' + esc(st.round) + "</div>" +
      (trackLine ? '<div class="rmeta">Runs on: ' + esc(trackLine) + ".</div>" : "") +
      '<div class="rprompt">' + esc(ROUND_PROMPT[st.key]) +
      ' <span class="rcount">(' + chosen + " of " + st.keep + " picked)</span></div>"
    )
  );
}

/* render the pick surface (single column split by the cutline) */
function renderPickSurface(node, state, onChange) {
  const st = currentStage(state);
  const board = el("div", { class: "cutboard" });

  /* selected (above the line) first, in seed order; then the rest */
  const selected = state.pool.filter(d => state.selection.includes(d.n));
  const rest = state.pool.filter(d => !state.selection.includes(d.n));

  const above = el("div", { class: "colstack", role: "group", "aria-label": "Surviving picks" });
  const below = el("div", { class: "colstack", role: "group", "aria-label": "Below the cutline" });

  const makeRow = (d, on) => {
    const cushion = modeledCushion(d, st);
    const cu = cushion == null ? "" :
      '<span class="cushion ' + cushionClass(cushion) + '" title="Modeled cushion (not scored)">' +
      esc(cushionLabel(cushion)) + "</span>";
    const isChamp = st.key === "champ";
    const row = el("button", {
      class: "drow" + (on ? (isChamp ? " on crowned" : " on") : ""),
      type: "button",
      "aria-pressed": on ? "true" : "false",
      "aria-label": d.n + (on ? ", selected" : ", not selected"),
    },
      '<span class="seed" aria-hidden="true">' + (d.seed || "") + "</span>" +
      '<span><span class="nm">' + esc(d.n) +
      '<span class="car">#' + esc(d.car) + "</span></span>" +
      tagChips(d.n, st) + "</span>" +
      (cu || '<span class="tick" aria-hidden="true">' + (on ? "\u25B2" : "+") + "</span>")
    );
    row.addEventListener("click", () => {
      toggle(state, d.n);
      renderPickSurface(node, state, onChange);
      if (onChange) onChange();
    });
    return row;
  };

  selected.forEach(d => above.appendChild(makeRow(d, true)));
  rest.forEach(d => below.appendChild(makeRow(d, false)));

  board.appendChild(above);

  if (st.key !== "champ") {
    const remaining = st.keep - state.selection.length;
    const tightLabel = remaining > 0
      ? remaining + " more above the line"
      : "line set, advance when ready";
    board.appendChild(el("div", { class: "cutline", role: "separator", "aria-label": "The cutline" },
      '<span class="ctag">The cutline</span>' +
      '<span class="ctight">' + esc(tightLabel) + "</span>"));
  }

  board.appendChild(below);
  mount(node, board);
}

/* desktop wide bracket from a finished/revealed bracket state.
   columns: 4 rounds plus the crown. Uses recorded history. */
function renderWideBracket(node, state) {
  const s = state.season;
  const byName = new Map(s.drivers.map(d => [d.n, d]));
  const cols = [
    { key: "ro16", title: "Round of 16", cut: 16 },
    { key: "ro12", title: "Round of 12", cut: 12 },
    { key: "ro8", title: "Round of 8", cut: 8 },
    { key: "champ", title: "Championship 4", cut: 4 },
  ];
  const wrap = el("div", { class: "wide-bracket", "aria-label": "Full bracket" });

  cols.forEach(col => {
    const c = el("div", { class: "wb-col" }, "<h4>" + esc(col.title) + "</h4>");
    let list;
    if (col.key === "ro16") list = s.drivers.slice();
    else list = s.drivers.filter(d => d.out < col.cut + 0.5 && d.out >= col.cut);
    /* show survivors of each round in that round's column */
    const survivors = s.drivers.filter(d => d.out < col.cut).slice()
      .sort((a, b) => (a.seed || 99) - (b.seed || 99));
    const pool = col.key === "ro16" ? s.drivers.slice().sort((a, b) => (a.seed || 99) - (b.seed || 99)) : survivors;
    pool.forEach(d => {
      const advanced = d.out < col.cut;
      const isChamp = col.key === "champ" && d.champ;
      c.appendChild(el("div", {
        class: "wb-cell" + (isChamp ? " champ" : advanced ? " adv" : " cut"),
      },
        '<span>' + esc(d.n) + "</span>" +
        '<span class="wbseed">' + (d.seed || "") + "</span>"));
    });
    wrap.appendChild(c);
  });

  const champ = s.drivers.find(d => d.champ);
  wrap.appendChild(el("div", { class: "wb-crown" },
    "Champion<br>" + esc(champ ? champ.n : "")));

  mount(node, wrap);
}

/* ---- src/render/reveal.js ---- */
/* ============================================================
   THE CUTLINE . render (reveal)
   ------------------------------------------------------------
   After a bracket is submitted, reveal what really happened. For
   each round we show the player's survivors against the real cut,
   marking each pick a hit, a miss, or a called upset, then the
   champion. Plain, declarative, no dashes in copy.
   ============================================================ */


const REVEAL_ROUNDS = [
  { key: "ro16", label: "Round of 16", cut: 16, keep: 12 },
  { key: "ro12", label: "Round of 12", cut: 12, keep: 8 },
  { key: "ro8", label: "Round of 8", cut: 8, keep: 4 },
];

/* build the reveal into a container.
   state: finished bracket state (has season + history)
   result: output of scoreBracket
   belowLine: optional { roundKey: Set } of below the line names */
function renderReveal(node, state, result, belowLine = {}) {
  const s = state.season;
  const byName = new Map(s.drivers.map(d => [d.n, d]));
  const picks = state.history;
  const frag = document.createDocumentFragment();

  REVEAL_ROUNDS.forEach(rd => {
    const advanced = picks[rd.key] || [];
    let hits = 0;
    const rows = advanced.map(name => {
      const d = byName.get(name);
      const ok = d && survived(d, rd.cut);
      if (ok) hits++;
      const bl = belowLine[rd.key];
      const upset = ok && bl && bl.has(name);
      let cls = "drow ", note;
      if (upset) { cls += "r-upset"; note = "Called upset. Below the line, advanced anyway."; }
      else if (ok) { cls += "r-hit"; note = "Survived the cut."; }
      else { cls += "r-miss"; note = "Cut here in reality."; }
      return el("div", { class: cls },
        '<span class="seed" aria-hidden="true">' + (d ? d.seed || "" : "") + "</span>" +
        '<span><span class="nm">' + esc(name) + "</span>" +
        '<span class="reveal-note">' + esc(note) + "</span></span>" +
        '<span class="tick" aria-hidden="true">' +
        (upset ? "\u26A1" : ok ? "\u2713" : "\u2717") + "</span>");
    });

    const summaryCls = hits === rd.keep ? "good" : hits === 0 ? "bad" : "";
    const round = el("div", { class: "reveal-round" });
    round.appendChild(el("div", { class: "rrh" },
      "<span>" + esc(rd.label) + "</span>" +
      '<span class="rrs ' + summaryCls + '">' + hits + " of " + rd.keep + " right</span>"));
    rows.forEach(r => round.appendChild(r));
    frag.appendChild(round);
  });

  /* champion */
  const champPick = picks.champion;
  const realChamp = s.drivers.find(d => d.champ);
  const champOK = champPick && realChamp && champPick === realChamp.n;
  const champRound = el("div", { class: "reveal-round" });
  champRound.appendChild(el("div", { class: "rrh" },
    "<span>Champion</span>" +
    '<span class="rrs ' + (champOK ? "good" : "bad") + '">' +
    (champOK ? "Called it" : "Missed") + "</span>"));
  champRound.appendChild(el("div", { class: "drow " + (champOK ? "r-hit" : "r-miss") },
    '<span class="seed" aria-hidden="true"></span>' +
    '<span><span class="nm">' + esc(realChamp ? realChamp.n : "") + "</span>" +
    '<span class="reveal-note">' +
    (champOK ? "Your pick took the title."
      : "You picked " + esc(champPick || "no one") + ". The title went to " + esc(realChamp ? realChamp.n : "") + ".") +
    "</span></span>" +
    '<span class="tick" aria-hidden="true">' + (champOK ? "\u2713" : "\u2717") + "</span>"));
  frag.appendChild(champRound);

  mount(node, frag);
}

/* ---- src/render/share.js ---- */
/* ============================================================
   THE CUTLINE . render (share)
   ------------------------------------------------------------
   A spoiler free share grid. One row per round, a square per
   surviving pick: filled for a hit, hollow for a miss, a bolt for
   a called upset. A flag marks the champion call. Builds the text
   for the clipboard and renders a preview.
   ============================================================ */


const SHARE_ROUNDS = [
  { key: "ro16", keep: 12 },
  { key: "ro12", keep: 8 },
  { key: "ro8", keep: 4 },
];

const HIT = "\u{1F7E9}";    /* green square */
const MISS = "\u2B1C";       /* white square */
const UPSET = "\u26A1";      /* bolt */
const FLAG = "\u{1F3C1}";    /* chequered flag */
const NO = "\u274C";         /* cross mark */

/* build the share text. result is scoreBracket output. */
function buildShareText(state, result, belowLine = {}) {
  const s = state.season;
  const byName = new Map(s.drivers.map(d => [d.n, d]));
  const picks = state.history;
  const no = state.no ? "#" + state.no : "";
  const lines = [];
  lines.push("THE CUTLINE " + no + " . " + s.year);

  SHARE_ROUNDS.forEach(rd => {
    const advanced = picks[rd.key] || [];
    let cells = "";
    advanced.forEach(name => {
      const d = byName.get(name);
      const survivedRound = d && survived(d, rdCut(rd.key));
      const bl = belowLine[rd.key];
      if (survivedRound && bl && bl.has(name)) cells += UPSET;
      else if (survivedRound) cells += HIT;
      else cells += MISS;
    });
    lines.push(cells);
  });

  const realChamp = s.drivers.find(d => d.champ);
  const champOK = picks.champion && realChamp && picks.champion === realChamp.n;
  lines.push((champOK ? FLAG : NO) + " " + (champOK ? "Champion called" : "Champion missed"));
  lines.push("Grade " + result.grade + "% . " + result.score + " pts");
  lines.push("motorsport.com/cutline");
  return lines.join("\n");
}

function rdCut(key) { return key === "ro16" ? 16 : key === "ro12" ? 12 : 8; }

/* render the share preview + copy control into a container */
function renderShare(node, state, result, belowLine = {}, onCopy) {
  const text = buildShareText(state, result, belowLine);
  const box = el("div", { class: "sharebox" });
  box.appendChild(el("div", { class: "sharegrid", "aria-hidden": "true" }, escapeGrid(text)));
  box.appendChild(el("div", { class: "sharecap" }, "Spoiler free. Share your bracket without giving away the field."));

  const copyBtn = el("button", { class: "btn", type: "button" }, "Copy result");
  copyBtn.addEventListener("click", async () => {
    let ok = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        ok = true;
      }
    } catch (e) { ok = false; }
    if (!ok) {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); ok = true; } catch (e) {}
      document.body.removeChild(ta);
    }
    if (onCopy) onCopy(ok, text);
  });

  mount(node, box, el("div", { class: "actionbar" }, ""));
  node.lastChild.appendChild(copyBtn);
  return text;
}

function escapeGrid(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

/* ---- src/ui/analytics.js ---- */
/* ============================================================
   THE CUTLINE . analytics
   ------------------------------------------------------------
   One thin layer for product events. By default it pushes to a
   window.dataLayer (GTM friendly) and calls window.gtag when
   present, and is a safe no op otherwise. The CMS can replace the
   sink with setAnalyticsSink to route events anywhere.
   ============================================================ */
const EVENTS = {
  GAME_START: "cutline_game_start",
  ROUND_ADVANCE: "cutline_round_advance",
  CHAMPION_PICK: "cutline_champion_pick",
  SUBMIT: "cutline_submit",
  REVEAL_VIEW: "cutline_reveal_view",
  SHARE: "cutline_share",
  MODE_SWITCH: "cutline_mode_switch",
  ARCHIVE_OPEN: "cutline_archive_open",
  WEEKLY_LOCK: "cutline_weekly_lock",
  HELP_OPEN: "cutline_help_open",
};

let sink = defaultSink;
function setAnalyticsSink(fn) { sink = typeof fn === "function" ? fn : defaultSink; }
function track(event, props = {}) {
  try { sink(event, { ...props, ts: Date.now() }); } catch (e) { /* never break the game on analytics */ }
}

function defaultSink(event, props) {
  if (typeof window === "undefined") return;
  if (Array.isArray(window.dataLayer)) window.dataLayer.push({ event, ...props });
  if (typeof window.gtag === "function") window.gtag("event", event, props);
}

/* ---- src/ui/store.js ---- */
/* ============================================================
   THE CUTLINE . persistence
   ------------------------------------------------------------
   Streaks and career stats survive across sessions when storage
   is available, and degrade to in memory when it is not (private
   mode, sandboxed embed). The game never breaks on storage.
   ============================================================ */

const KEY = "cutline:v1";
const mem = {};
let useLS = false;

try {
  const k = "__cutline_probe__";
  window.localStorage.setItem(k, "1");
  window.localStorage.removeItem(k);
  useLS = true;
} catch (e) { useLS = false; }
function loadStats() {
  try {
    const raw = useLS ? window.localStorage.getItem(KEY) : mem[KEY];
    return raw ? JSON.parse(raw) : statsDefaults();
  } catch (e) { return statsDefaults(); }
}
function saveStats(state) {
  try {
    const raw = JSON.stringify(state);
    if (useLS) window.localStorage.setItem(KEY, raw); else mem[KEY] = raw;
  } catch (e) { /* ignore */ }
}
function statsDefaults() {
  return { played: 0, bestGrade: 0, streak: 0, lastNo: null, history: [] };
}

/* record a finished daily result and update the streak */
function recordResult(no, result) {
  const s = loadStats();
  if (s.lastNo === no) return s; /* already counted this puzzle */
  s.played += 1;
  s.bestGrade = Math.max(s.bestGrade, result.grade);
  s.streak = (s.lastNo != null && no === s.lastNo + 1) ? s.streak + 1 : 1;
  s.lastNo = no;
  s.history.unshift({ no, grade: result.grade, score: result.score });
  s.history = s.history.slice(0, 60);
  saveStats(s);
  return s;
}
const storageMode = () => (useLS ? "local" : "memory");

function startSeason(year) {

function renderPlay() {

function renderConfidence(node, state) {
  const st = currentStage(state);
  const key = st.key === "champ" ? "champion" : st.key;
  const current = state.confidence[key] || 1;
  clear(node);
  const wrap = el("div", { class: "metarow", style: "margin-top:12px", role: "group", "aria-label": "Confidence bet for this round" });
  wrap.appendChild(el("span", { class: "pill" }, "Confidence"));
  CONF_LEVELS.forEach(c => {
    const b = el("button", {

      "aria-pressed": current === c.v ? "true" : "false",
      style: current === c.v ? "color:var(--bg);background:var(--amber);border-color:var(--amber)" : "",
    }, c.label);
    b.addEventListener("click", () => { state.confidence[key] = c.v; renderConfidence(node, state); });
    wrap.appendChild(b);
  });
  node.appendChild(wrap);
}

function renderAction(node, state, surfaceHost, headHost, confHost) {
  const st = currentStage(state);
  clear(node);
  const bar = el("div", { class: "actionbar" });
  const ready = canAdvance(state);
  const isFinal = st.key === "champ";
  const label = isFinal ? "Lock in champion" : "Confirm cut, next round";
  const btn = el("button", { class: "btn", type: "button" }, label);
  btn.disabled = !ready;
  btn.addEventListener("click", () => {
    if (st.key === "champ") track(EVENTS.CHAMPION_PICK, { year: state.season.year, pick: state.selection[0] });
    const r = advance(state);
    if (!r.ok) { toast("Pick " + st.keep + " to advance."); return; }
    if (r.done) { finishBracket(state); return; }
    track(EVENTS.ROUND_ADVANCE, { year: state.season.year, stage: st.key });
    renderRoundHead(headHost, state);
    renderConfidence(confHost, state);
    renderPickSurface(surfaceHost, state, () => {
      renderRoundHead(headHost, state);
      renderConfidence(confHost, state);
      renderAction(node, state, surfaceHost, headHost, confHost);
    });
    renderAction(node, state, surfaceHost, headHost, confHost);
    App.refs.play.scrollIntoView({ behavior: "smooth", block: "start" });
  });
  bar.appendChild(btn);
  node.appendChild(bar);
}

/* model the below the line set for upset bonus from seeds, flagged.
   a driver who survived but entered seeded outside the keep count
   is treated as having been below the line. honest model, never
   fabricates a points value. */
function modeledBelowLine(season) {
  const out = {};
  const stages = [
    { key: "ro16", cut: 16, keep: 12 },
    { key: "ro12", cut: 12, keep: 8 },
    { key: "ro8", cut: 8, keep: 4 },
  ];
  for (const s of stages) {
    const survivors = season.drivers.filter(d => d.out < s.cut)
      .slice().sort((a, b) => (a.seed || 99) - (b.seed || 99));
    /* the lowest seeded survivors are the modeled upsets */
    const below = new Set(survivors.slice(s.keep - 2 < 0 ? 0 : s.keep - 2).map(d => d.n));
    out[s.key] = below;
  }
  return out;
}

function finishBracket(state) {
  const picks = toPicks(state);
  const belowLine = modeledBelowLine(state.season);
  const result = scoreBracket({ season: state.season, picks, confidence: state.confidence, belowLine });
  track(EVENTS.SUBMIT, { year: state.season.year, grade: result.grade, score: result.score, mode: state.mode });

  if (state.mode === "daily") {
    const stats = recordResult(state.no, result);
    App.refs.streakPill.innerHTML = "Streak <b>" + stats.streak + "</b>";
  }
  renderResult(state, result, belowLine);
}

function renderResult(state, result, belowLine) {
  const node = App.refs.result;
  clear(node);
  showScreen("result");
  track(EVENTS.REVEAL_VIEW, { year: state.season.year });

  const v = el("div", { class: "verdict " + result.tag },
    '<div class="grade">' + result.grade + "%</div>" +
    '<div class="glabel">' + esc(result.label) + "</div>" +
    '<div class="ghead">' + esc(result.headline) + "</div>" +
    '<div class="pct">Estimated top ' + Math.max(1, 100 - result.percentile) + "% of brackets</div>");
  const sl = el("div", { class: "scoreline" });
  sl.appendChild(el("div", { class: "scorebox" }, '<div class="v">' + result.score + '</div><div class="k">Score</div>'));
  sl.appendChild(el("div", { class: "scorebox" }, '<div class="v">' + result.grade + '%</div><div class="k">Accuracy</div>'));
  sl.appendChild(el("div", { class: "scorebox" }, '<div class="v">' + (result.championOK ? "Yes" : "No") + '</div><div class="k">Champion</div>'));
  v.appendChild(sl);
  node.appendChild(v);

  node.appendChild(el("div", { class: "section-h" }, "What really happened"));
  const revealHost = el("div"); node.appendChild(revealHost);
  renderReveal(revealHost, state, result, belowLine);

  node.appendChild(el("div", { class: "section-h" }, "Share"));
  const shareHost = el("div"); node.appendChild(shareHost);
  renderShare(shareHost, state, result, belowLine, (ok) => {
    toast(ok ? "Result copied." : "Copy not available. Select and copy the grid.");
    track(EVENTS.SHARE, { year: state.season.year, grade: result.grade });
  });

  node.appendChild(el("div", { class: "section-h" }, "Full bracket"));
  const wideHost = el("div"); node.appendChild(wideHost);
  renderWideBracket(wideHost, state);

  const bar = el("div", { class: "actionbar two" });
  const again = el("button", { class: "btn ghost", type: "button" }, "Play the archive");
  again.addEventListener("click", () => { showScreen("play"); App.refs.archive.scrollIntoView({ behavior: "smooth" }); });
  const back = el("button", { class: "btn ghost", type: "button" }, "Back to today");
  back.addEventListener("click", () => { startDaily(); });
  bar.appendChild(back); bar.appendChild(again);
  node.appendChild(bar);

  node.scrollIntoView({ behavior: "smooth", block: "start" });
}

/* ---------- archive ---------- */
function renderArchive() {
  const node = App.refs.archive;
  clear(node);
  node.appendChild(el("div", { class: "section-h" }, "The archive . 2014 to 2025"));
  const grid = el("div", { class: "arch-grid" });
  allYears().forEach(year => {
    const s = seasonByYear(year);
    const full = isFullyVerified(s);
    const champ = s.drivers.find(d => d.champ);
    const card = el("button", {
      class: "arch-card" + (full ? "" : " locked"), type: "button",
      "aria-label": year + " season, champion " + (champ ? champ.n : "") + (full ? ", playable" : ", finalists view"),
    },
      '<div class="ay">' + year + "</div>" +
      '<div class="ac">Champion <span>' + esc(champ ? champ.n : "") + "</span></div>" +
      '<div class="atag ' + (full ? "full" : "part") + '">' + (full ? "Play bracket" : "Finalists only") + "</div>");
    card.addEventListener("click", () => {
      track(EVENTS.ARCHIVE_OPEN, { year, verified: full });
      startSeason(year);
    });
    grid.appendChild(card);
  });
  node.appendChild(grid);
}

/* finalists view for a pending season: champion plus the four,
   clearly flagged, never asserting unverified intermediate cuts. */
function showFinalists(season) {
  const four = season.drivers.filter(d => d.out === 4);
  const champ = four.find(d => d.champ);
  const rows = four.slice().sort((a, b) => (a.champ ? -1 : 0) - (b.champ ? -1 : 0))
    .map(d => '<div class="rule">' + (d.champ ? "<b>Champion: " + esc(d.n) + "</b>" : esc(d.n)) + "</div>").join("");
  openModal(season.year + " finalists",
    "<p>The full bracket for " + season.year + " is not verified end to end yet, so it is not playable. " +
    "The Championship 4 and the champion are confirmed.</p>" + rows +
    '<p class="visually-quiet">Verified intermediate rounds arrive from Motorsport Stats. Until then this season stays out of the scored daily.</p>');
}

/* ---------- Mode B: live ---------- */
function renderLive() {
  const node = App.refs.live;
  clear(node);
  const feed = App.live || (App.live = demoFeed());
  const meta = feed.meta();

  const banner = el("div", { class: "brief" },
    '<div class="bl">Live mode</div>' +
    '<div class="byr">' + esc(meta.label) + "</div>" +
    '<div class="bsub">Picks lock at the green flag of each round. The cutline updates from real points as the round runs.</div>' +
    (FEED_SOURCE !== "motorsport-stats"
      ? '<span class="flag">Demo feed. Real season wires in at handoff.</span>' : ""));
  node.appendChild(banner);

  /* round selector by lock state */
  const rounds = feed.rounds();
  node.appendChild(el("div", { class: "section-h" }, "Rounds"));
  const list = el("div", { class: "roundbreak" });
  rounds.forEach(r => {
    const ls = lockState(r);
    const ttl = timeToLock(r);
    const when = ls === "open"
      ? (ttl != null ? "Locks in " + fmtDur(ttl) : "Open")
      : ls === "locked" ? "Locked" : "Scheduled";
    const row = el("div", { class: "rbrow" },
      '<span class="rl">' + esc(r.label) + "</span>" +
      '<span class="rh">' + r.races.filter(x => x.done).length + " of " + r.races.length + " races run</span>" +
      '<span class="rn" style="font-size:13px;color:' + (ls === "open" ? "var(--green)" : "var(--muted)") + '">' + esc(when) + "</span>");
    list.appendChild(row);
  });
  node.appendChild(list);

  /* live cutline for the open round */
  const open = rounds.find(r => lockState(r) === "open" && r.key !== "finale") || rounds[0];
  node.appendChild(el("div", { class: "section-h" }, "Live cutline . " + esc(open.label)));
  const standings = feed.standings(open.key).map(s => ({ name: s.name, car: s.car, seed: s.seed, points: s.points, won: s.won }));
  const cut = computeCutline(standings, open.key);

  const board = el("div", { class: "cutboard" });
  const ranked = standings.slice().sort((a, b) => {
    const av = a.won ? Infinity : a.points, bv = b.won ? Infinity : b.points;
    return bv - av;
  });
  const above = el("div"), below = el("div");
  let lineDrawn = false;
  ranked.forEach(d => {
    const adv = cut.advancing.has(d.name);
    if (!adv && !lineDrawn) {
      board.appendChild(above);
      board.appendChild(el("div", { class: "cutline", role: "separator" },
        '<span class="ctag">The cutline</span>' +
        '<span class="ctight">' + (cut.lastIn ? "last in " + esc(cut.lastIn.name) : "") + "</span>"));
      lineDrawn = true;
    }
    const cv = cut.cushions.get(d.name);
    const cls = cv === Infinity ? "lock" : cv > 0 ? "pos" : cv < 0 ? "neg" : "";
    const row = el("div", { class: "drow" + (adv ? " on" : "") },
      '<span class="seed">' + (d.seed || "") + "</span>" +
      '<span><span class="nm">' + esc(d.name) + '<span class="car">#' + esc(d.car) + "</span></span></span>" +
      '<span class="cushion ' + cls + '">' + esc(cushionLabel(cv)) + "</span>");
    (lineDrawn ? below : above).appendChild(row);
  });
  board.appendChild(below);
  node.appendChild(board);

  /* lock note */
  if (lockState(open) === "open") {
    track(EVENTS.WEEKLY_LOCK, { round: open.key, state: "open" });
  }

  node.appendChild(el("div", { class: "section-h" }, "Leaderboard"));
  node.appendChild(el("div", { class: "adslot" },
    '<div class="adk">Live standings</div>' +
    '<div class="adm">The weekly leaderboard populates from submitted brackets once the season is live.</div>'));
}

function fmtDur(ms) {
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  if (d > 0) return d + "d " + h + "h";
  const m = Math.floor((ms % 3600000) / 60000);
  return h + "h " + m + "m";
}


/* ---- bootstrap ---- */
(function () {
  function boot() {
    var root = document.getElementById("the-cutline");
    if (!root) { root = document.createElement("div"); root.id = "the-cutline"; document.body.appendChild(root); }
    mountApp(root);
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();

})();
</script>
